<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RYSE Daily Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f0f;
    color: #e8e4dc;
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    padding: 32px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .card {
    background: #161616;
    border: 1px solid #2a2a2a;
    border-radius: 16px;
    padding: 32px;
    max-width: 540px;
    width: 100%;
  }

  /* MOBILE */
  @media (max-width: 600px) {
    body { padding: 16px 12px; }
    .card { padding: 20px 16px; border-radius: 12px; }
    .notes-actions { flex-wrap: wrap; }
    .category-row { flex-wrap: wrap; }
    .date-nav { gap: 6px; }
  }

  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    padding-bottom: 16px;
    border-bottom: 1px solid #222;
    flex-wrap: wrap;
  }
  .header-icon { font-size: 18px; }
  .header-title {
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .header-date {
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    color: #555;
    margin-left: auto;
  }

  /* DATE NAV */
  .date-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 4px 0 18px;
    margin-bottom: 10px;
    border-bottom: 1px solid #1e1e1e;
    flex-wrap: wrap;
  }
  .nav-btn {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    color: #c8a96e;
    width: 36px;
    height: 36px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 18px;
    font-weight: 600;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .nav-btn:hover { background: #222; border-color: #3a3a3a; color: #e8d4a0; }
  .date-btn {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    color: #e8e4dc;
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.15s, border-color 0.15s;
    height: 36px;
  }
  .date-btn:hover { background: #222; border-color: #3a3a3a; }
  .date-btn-arrow { color: #666; font-size: 9px; }
  .view-date-input {
    position: absolute;
    opacity: 0;
    pointer-events: none;
    width: 1px;
    height: 1px;
    left: 0;
    top: 0;
  }
  .today-btn {
    background: transparent;
    border: 1px solid #2a2a2a;
    color: #888;
    padding: 0 14px;
    height: 36px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.03em;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
  }
  .today-btn:hover { color: #c8a96e; border-color: #3a3a3a; }
  .today-btn.active {
    background: #1a1500;
    border-color: #3a2e00;
    color: #c8a96e;
    cursor: default;
  }
  .day-badge {
    display: inline-block;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 4px;
    margin-left: 8px;
    vertical-align: middle;
  }
  .day-badge.past    { background: #1e1e1e; color: #888; border: 1px solid #333; }
  .day-badge.future  { background: #1a1500; color: #c8a96e; border: 1px solid #3a2e00; }

  /* COLLAPSIBLE EVENT */
  .event {
    border-bottom: 1px solid #1e1e1e;
  }
  .event:last-child { border-bottom: none; }
  .event-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 14px 0;
    cursor: pointer;
    user-select: none;
  }
  .event-header:hover { opacity: 0.85; }
  .event-collapse-arrow {
    font-style: normal;
    color: #444;
    font-size: 14px;
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .event.collapsed .event-collapse-arrow { transform: rotate(-90deg); }
  .event-header-info { flex: 1; min-width: 0; }
  .event-body { padding-bottom: 16px; }
  .event.collapsed .event-body { display: none; }

  /* CURRENT CALL highlight */
  .event.current-call {
    background: #1a1500;
    border-radius: 8px;
    padding: 0 12px;
    margin: 4px -12px;
    border: 1px solid #3a2e00;
    border-bottom: 1px solid #3a2e00;
  }
  .current-call-badge {
    display: inline-block;
    background: #c8a96e;
    color: #000;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    border-radius: 4px;
    padding: 2px 7px;
    margin-bottom: 4px;
    flex-shrink: 0;
  }

  .event-time {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: #c8a96e;
    letter-spacing: 0.02em;
  }
  .event-name {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .event-meta {
    font-size: 12px;
    color: #666;
    line-height: 1.9;
    margin-top: 6px;
  }
  .event-meta a {
    color: #6b9fd4;
    text-decoration: none;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
  }
  .event-meta a:hover { color: #88b8e8; text-decoration: underline; }
  .issue {
    display: inline-block;
    background: #251e14;
    border-left: 3px solid #c8a96e;
    color: #d4b87a;
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 0 4px 4px 0;
    margin: 2px 0;
  }

  /* UNSAVED DOT */
  .unsaved-dot {
    display: none;
    width: 7px;
    height: 7px;
    background: #c8a96e;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .followup-section {
    margin-top: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .followup-checkbox {
    width: 16px;
    height: 16px;
    accent-color: #c8a96e;
    cursor: pointer;
  }
  .followup-label {
    font-size: 12px;
    color: #666;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    cursor: pointer;
    user-select: none;
  }
  .followup-label.checked { color: #c8a96e; }

  /* CATEGORY */
  .category-row {
    margin-top: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .category-label {
    font-size: 12px;
    color: #555;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .category-select {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 6px;
    color: #c8c4bc;
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    padding: 4px 10px;
    cursor: pointer;
    outline: none;
    transition: border-color 0.15s;
  }
  .category-select:focus { border-color: #3a3a3a; }

  .resolution-row {
    margin-top: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .resolution-label {
    font-size: 12px;
    color: #555;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .resolution-select {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 6px;
    color: #c8c4bc;
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    padding: 4px 10px;
    cursor: pointer;
    outline: none;
    transition: border-color 0.15s, background 0.15s;
  }
  .resolution-select:focus { border-color: #3a3a3a; }
  .resolution-select.resolved  { background: #0e1a0e; border-color: #2d4d2d; color: #6bbf6b; }
  .resolution-select.pending   { background: #1a1500; border-color: #3a2e00; color: #c8a96e; }
  .resolution-select.escalated { background: #2e0a0a; border-color: #5a1a1a; color: #f87171; }

  .notes-section {
    margin-top: 12px;
    border-top: 1px dashed #222;
    padding-top: 12px;
  }
  .notes-toggle {
    background: none;
    border: none;
    cursor: pointer;
    color: #555;
    font-family: 'Outfit', sans-serif;
    font-size: 11px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0;
    transition: color 0.15s;
  }
  .notes-toggle:hover { color: #888; }
  .notes-toggle.has-notes { color: #6bbf6b; }
  .notes-toggle .arrow {
    display: inline-block;
    transition: transform 0.2s;
    font-style: normal;
  }
  .notes-toggle.open .arrow { transform: rotate(90deg); }
  .notes-body { display: none; margin-top: 10px; }
  .notes-body.open { display: block; }
  .notes-textarea {
    width: 100%;
    background: #111;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    color: #c8c4bc;
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    padding: 10px 12px;
    resize: vertical;
    min-height: 80px;
    line-height: 1.6;
    outline: none;
    transition: border-color 0.15s;
  }
  .notes-textarea:focus { border-color: #3a3a3a; }
  .notes-textarea.dirty { border-color: #5a4a1a; }
  .notes-textarea::placeholder { color: #333; }
  .notes-actions {
    display: flex;
    gap: 8px;
    margin-top: 8px;
    align-items: center;
  }
  .btn-save {
    background: #1a2e1a;
    border: 1px solid #2d4d2d;
    color: #6bbf6b;
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 5px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-save:hover { background: #213d21; }
  .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-save .spinner {
    display: none;
    width: 11px; height: 11px;
    border: 2px solid rgba(107,191,107,0.3);
    border-top-color: #6bbf6b;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
  .btn-save.saving .spinner { display: inline-block; }
  .btn-save.saving .btn-label { display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .btn-clear {
    background: none;
    border: none;
    color: #444;
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    cursor: pointer;
    padding: 5px 8px;
    transition: color 0.15s;
  }
  .btn-clear:hover { color: #888; }
  .save-status {
    font-size: 11px;
    color: #555;
    margin-left: auto;
    font-family: 'Outfit', sans-serif;
  }
  .save-status.saved { color: #6bbf6b; }
  .save-status.error { color: #e07b7b; }
  .save-status.saving { color: #c8a96e; }

  /* RETRY BUTTON */
  .btn-retry {
    background: none;
    border: 1px solid #5a3a1a;
    color: #c8a96e;
    font-family: 'Outfit', sans-serif;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 5px;
    cursor: pointer;
    display: none;
  }
  .btn-retry.visible { display: inline-block; }

  .notes-preview {
    font-size: 12px;
    color: #5a7a5a;
    line-height: 1.6;
    white-space: pre-wrap;
    font-family: 'Outfit', sans-serif;
    margin-top: 8px;
    padding: 8px 10px;
    background: #0e1a0e;
    border-radius: 6px;
    border-left: 2px solid #2d4d2d;
  }
  .bottom-btns {
    margin-top: 24px;
    display: flex;
    gap: 10px;
    max-width: 540px;
    width: 100%;
  }
  .copy-btn {
    flex: 1;
    padding: 13px;
    background: #1e1e1e;
    border: 1px solid #2e2e2e;
    border-radius: 10px;
    color: #e8e4dc;
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .copy-btn:hover { background: #252525; border-color: #3a3a3a; color: #fff; }
  .copy-btn.copied { background: #1a2e1a; border-color: #2d4d2d; color: #6bbf6b; }
  #auth-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    padding: 48px 0 40px;
    text-align: center;
  }
  .auth-icon {
    width: 52px;
    height: 52px;
    border-radius: 14px;
    background: #1e1e1e;
    border: 1px solid #2a2a2a;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 24px;
  }
  .auth-title {
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.02em;
    margin-bottom: 6px;
  }
  .auth-subtitle {
    color: #444;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-family: 'Outfit', sans-serif;
    margin-bottom: 32px;
  }
  .sign-in-btn {
    width: 100%;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    color: #e8e4dc;
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 14px 18px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }
  .sign-in-btn:hover { background: #222; border-color: #3a3a3a; }
  .auth-hint {
    font-family: 'Outfit', sans-serif;
    font-size: 11px;
    color: #333;
    margin-top: 8px;
    line-height: 1.6;
  }
  #loading {
    color: #555;
    font-size: 13px;
    text-align: center;
    padding: 32px 0;
    font-family: 'Outfit', sans-serif;
  }
  #events-container { width: 100%; }
  #no-events { color: #555; font-size: 13px; text-align: center; padding: 24px 0; }
  .sign-out-btn {
    background: none;
    border: none;
    color: #444;
    font-family: 'Outfit', sans-serif;
    font-size: 11px;
    cursor: pointer;
    padding: 0;
    transition: color 0.15s;
  }
  .sign-out-btn:hover { color: #888; }
</style>
</head>
<body>


<div class="card" id="main-card">
  <div class="header">
    <span class="header-icon" aria-hidden="true">📅</span>
    <span class="header-title">Schedule</span>
    <span class="header-date" id="today-date"></span>
    <button class="sign-out-btn" id="sign-out-btn" style="display:none" onclick="signOut()" aria-label="Sign out">Sign out</button>
  </div>

  <!-- DATE NAVIGATION -->
  <div class="date-nav" id="date-nav" style="display:none">
    <button class="nav-btn" onclick="navigateDay(-1)" aria-label="Previous day">‹</button>
    <button class="date-btn" onclick="openDatePicker()" aria-label="Pick a date">
      <span id="view-date-label"></span>
      <span class="date-btn-arrow" aria-hidden="true">▾</span>
    </button>
    <input type="date" id="view-date-input" class="view-date-input" onchange="jumpToDay(this.value)" aria-label="Select date">
    <button class="nav-btn" onclick="navigateDay(1)" aria-label="Next day">›</button>
    <button class="today-btn" id="today-btn" onclick="goToToday()" aria-label="Jump to today">Today</button>
  </div>

  <div id="auth-section" role="main">
    <div class="auth-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#c8a96e" stroke-width="1.5" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/><path d="M8 14h4M8 17h6"/></svg>
    </div>
    <div class="auth-title">RYSE Call Logs</div>
    <div class="auth-subtitle">Agent Support Dashboard</div>
    <button class="sign-in-btn" onclick="signIn()" aria-label="Sign in with Google">
      <span style="display:flex;align-items:center;gap:10px;margin:0 auto;">
        <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Sign in with Google
      </span>
    </button>
    <div class="auth-hint">Requires Calendar access</div>
  </div>

  <div id="loading" style="display:none" role="status" aria-live="polite">Loading calls…</div>
  <div id="events-container" style="display:none" role="list"></div>
  <div id="no-events" style="display:none" role="status">No support calls found for this day.</div>
</div>

<div class="bottom-btns" id="bottom-btns" style="display:none">
  <button class="copy-btn" id="copy-btn" onclick="copySchedule(this)" aria-label="Copy schedule to clipboard">
    <span aria-hidden="true">📋</span> Copy Schedule
  </button>
</div>

<script>
  const CLIENT_ID = '1046847497846-hgdkmgpd53pbq5uiv9vhbigv133hj8ha.apps.googleusercontent.com';
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwtYxAAb8ob0QefsTELi1X3vtUJ47K152M6KjgU60fh4g96uk7yrJzBh9BH-xknqNjj/exec';
  const SCOPES = 'https://www.googleapis.com/auth/calendar.readonly';

  function isRYSESupportCall(event) {
    const title = (event.summary || '').toLowerCase();
    const desc = (event.description || '').toLowerCase();
    const hasPranavPallam = title.includes('pranav pallam');
    const hasCalendly = desc.includes('calendly');
    const hasPhone = /\+?1?[\s.-]?\(?\d{3}\)?[\s.-]?\d{3}[\s.-]?\d{4}/.test(desc);
    const hasOrderNumber = /order\s*(number)?[^:]*:\s*[a-z]{1,4}\d+/i.test(desc);
    return hasPranavPallam || hasCalendly || hasPhone || hasOrderNumber;
  }

  let tokenClient;
  let accessToken = null;
  let todayEvents = [];
  let localNotes = {};
  // Store pending save payloads for retry
  let pendingRetry = {};

  // "today" is the real-world today, used only for comparisons.
  // "viewDate" is the currently-displayed day and can change via navigation.
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  let viewDate = new Date(today);

  // -------- DATE HELPERS --------
  function isSameDay(a, b) {
    return a.getFullYear() === b.getFullYear()
        && a.getMonth() === b.getMonth()
        && a.getDate() === b.getDate();
  }
  function isPastDate(d) { return d < today && !isSameDay(d, today); }
  function isFutureDate(d) { return d > today && !isSameDay(d, today); }

  function formatDateLabel(d) {
    return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
  }
  // Matches the format used in the sheet, e.g. "Apr 18, 2026"
  function formatDateForApps(d) {
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }
  function toDateInputValue(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }

  function isCurrentCall(event) {
    const now = new Date();
    const start = new Date(event.start?.dateTime || event.start?.date);
    const end = new Date(event.end?.dateTime || event.end?.date);
    return now >= start && now <= end;
  }

  function toTitleCase(str) {
    return str.replace(/\w\S*/g, w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase());
  }

  // -------- DATE NAV --------
  function updateDateUI() {
    const label = formatDateLabel(viewDate);
    document.getElementById('view-date-label').textContent = label;
    document.getElementById('view-date-input').value = toDateInputValue(viewDate);

    // Top-right header date shows which day + a small badge for non-today
    const headerDate = document.getElementById('today-date');
    let badge = '';
    if (isPastDate(viewDate))   badge = '<span class="day-badge past">Past</span>';
    if (isFutureDate(viewDate)) badge = '<span class="day-badge future">Upcoming</span>';
    headerDate.innerHTML = label.toUpperCase() + badge;

    const todayBtn = document.getElementById('today-btn');
    if (isSameDay(viewDate, today)) {
      todayBtn.classList.add('active');
      todayBtn.textContent = '● Today';
    } else {
      todayBtn.classList.remove('active');
      todayBtn.textContent = 'Today';
    }
  }

  function navigateDay(delta) {
    const newDate = new Date(viewDate);
    newDate.setDate(newDate.getDate() + delta);
    newDate.setHours(0, 0, 0, 0);
    viewDate = newDate;
    updateDateUI();
    fetchEventsForDate(viewDate);
  }

  function jumpToDay(dateStr) {
    if (!dateStr) return;
    const [y, m, d] = dateStr.split('-').map(Number);
    viewDate = new Date(y, m - 1, d);
    viewDate.setHours(0, 0, 0, 0);
    updateDateUI();
    fetchEventsForDate(viewDate);
  }

  function goToToday() {
    if (isSameDay(viewDate, today)) return;
    viewDate = new Date(today);
    updateDateUI();
    fetchEventsForDate(viewDate);
  }

  function openDatePicker() {
    const input = document.getElementById('view-date-input');
    if (input.showPicker) {
      try { input.showPicker(); return; } catch(e) { /* fallback below */ }
    }
    input.focus();
    input.click();
  }

  window.onload = () => {
    if (typeof google === "undefined") {
      document.getElementById("loading").style.display = "block";
      document.getElementById("loading").textContent = "Error: Google API failed to load.";
      return;
    }
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: SCOPES,
      callback: (resp) => {
        if (resp.error) { console.error(resp); return; }
        accessToken = resp.access_token;
        document.getElementById('sign-out-btn').style.display = 'block';
        document.getElementById('date-nav').style.display = 'flex';
        updateDateUI();
        fetchEventsForDate(viewDate);
      }
    });
    const cached = sessionStorage.getItem('ryse_token');
    if (cached) {
      accessToken = cached;
      document.getElementById('auth-section').style.display = 'none';
      document.getElementById('sign-out-btn').style.display = 'block';
      document.getElementById('date-nav').style.display = 'flex';
      updateDateUI();
      fetchEventsForDate(viewDate);
    }
  };

  function signIn() {
    tokenClient.requestAccessToken({ prompt: 'consent' });
    document.getElementById('auth-section').style.display = 'none';
    document.getElementById('loading').style.display = 'block';
  }

  function signOut() {
    google.accounts.oauth2.revoke(accessToken, () => {});
    accessToken = null;
    sessionStorage.removeItem('ryse_token');
    document.getElementById('auth-section').style.display = 'flex';
    document.getElementById('events-container').style.display = 'none';
    document.getElementById('bottom-btns').style.display = 'none';
    document.getElementById('sign-out-btn').style.display = 'none';
    document.getElementById('date-nav').style.display = 'none';
    document.getElementById('no-events').style.display = 'none';
    document.getElementById('events-container').innerHTML = '';
    localNotes = {};
    pendingRetry = {};
  }

  // -------------------------------------------------------------------------
  //  ALL sheet operations go through the Apps Script (one GET request).
  // -------------------------------------------------------------------------
  async function sendToSheet(payload) {
    const url = APPS_SCRIPT_URL + '?data=' + encodeURIComponent(JSON.stringify(payload));
    const res = await fetch(url, { method: 'GET' });
    const result = await res.json();
    if (!result.success) {
      throw new Error(result.error || 'Apps Script returned no success');
    }
    return result;
  }

  async function autoSaveEvents(events) {
    const dateLabel = formatDateForApps(viewDate);
    for (const event of events) {
      const startTime = formatTime(event.start?.dateTime);
      const endTime = formatTime(event.end?.dateTime);
      const timeRange = startTime && endTime ? startTime.replace(' EDT','') + ' – ' + endTime : startTime;
      const issue = getIssueFromDescription(event.description);
      try {
        await sendToSheet({ action: 'add', date: dateLabel, time: timeRange, event: event.summary || '', issue });
      } catch(err) {
        console.error('autoSave failed for event', event.summary, err);
      }
    }
  }

  async function fetchEventsForDate(date) {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('events-container').style.display = 'none';
    document.getElementById('no-events').style.display = 'none';
    document.getElementById('events-container').innerHTML = '';
    document.getElementById('bottom-btns').style.display = 'none';
    // Clear per-day state — new events get new IDs
    localNotes = {};
    pendingRetry = {};

    const start = new Date(date); start.setHours(0,0,0,0);
    const end = new Date(date); end.setHours(23,59,59,999);

    const url = `https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${start.toISOString()}&timeMax=${end.toISOString()}&singleEvents=true&orderBy=startTime`;

    try {
      const res = await fetch(url, { headers: { Authorization: `Bearer ${accessToken}` } });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);

      sessionStorage.setItem('ryse_token', accessToken);

      todayEvents = (data.items || []).filter(e => {
        const title = (e.summary || '').toLowerCase();
        const isCancelled = title.startsWith('canceled:') || title.startsWith('cancelled:');
        return isRYSESupportCall(e) && !isCancelled;
      });

      document.getElementById('loading').style.display = 'none';

      if (todayEvents.length === 0) {
        document.getElementById('no-events').style.display = 'block';
        return;
      }

      renderEvents(todayEvents);
      document.getElementById('events-container').style.display = 'block';
      document.getElementById('bottom-btns').style.display = 'flex';

      // Auto-save rows for today and past only. Future days are preview;
      // a row is created on first manual Save (see saveNotes).
      if (!isFutureDate(viewDate)) {
        autoSaveEvents(todayEvents);
      }

    } catch(err) {
      document.getElementById('loading').textContent = 'Error loading events: ' + err.message;
    }
  }

  function formatTime(dateTimeStr) {
    if (!dateTimeStr) return '';
    const d = new Date(dateTimeStr);
    return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true }) + ' EDT';
  }

  function getIssueFromDescription(desc) {
    if (!desc) return '';
    const plain = desc
      .replace(/<br\s*\/?>/gi, '\n').replace(/<[^>]*>/g, '')
      .replace(/&amp;/g, '&').replace(/&#39;/g, "'").replace(/&nbsp;/g, ' ');
    const lines = plain.split('\n');
    for (const line of lines) {
      if (/troubleshooting/i.test(line)) {
        const lastColon = line.lastIndexOf(': ');
        if (lastColon !== -1) {
          const answer = line.substring(lastColon + 2).trim();
          if (answer.length > 2 && !/https?:\/\//.test(answer)) return answer;
        }
      }
    }
    return '';
  }

  function getMeetLink(event) {
    if (event.hangoutLink) return event.hangoutLink;
    const match = (event.description || '').match(/https:\/\/meet\.google\.com\/[a-z-]+/);
    return match ? match[0] : null;
  }

  function getPhone(event) {
    const combined = (event.location || '') + ' ' + (event.description || '');
    const match = combined.match(/\+?1?[\s.-]?\(?\d{3}\)?[\s.-]?\d{3}[\s.-]?\d{4}/);
    return match ? match[0].trim() : null;
  }

  function renderEvents(events) {
    const container = document.getElementById('events-container');
    container.innerHTML = '';

    events.forEach((event, idx) => {
      const id = 'event_' + idx;
      const startTime = formatTime(event.start?.dateTime || event.start?.date);
      const endTime = formatTime(event.end?.dateTime || event.end?.date);
      const timeRange = startTime && endTime ? `${startTime.replace(' EDT','')} – ${endTime}` : startTime;
      const rawTitle = event.summary || 'Untitled Event';
      const title = toTitleCase(rawTitle);
      const issue = getIssueFromDescription(event.description);
      const meetLink = getMeetLink(event);
      const phone = getPhone(event);
      // Only show the "● Now" badge if we're viewing today (not a past/future day)
      const isCurrent = isCurrentCall(event) && isSameDay(viewDate, today);

      const div = document.createElement('div');
      div.className = 'event' + (isCurrent ? ' current-call' : '');
      div.id = 'event-div-' + id;
      div.setAttribute('role', 'listitem');

      // Escape title/issue for inline onclick attributes
      const safeTitle = rawTitle.replace(/'/g, "\\'");
      const safeTime = timeRange.replace(/'/g, "\\'");
      const safeIssue = issue.replace(/'/g, "\\'");

      div.innerHTML = `
        <div class="event-header" onclick="toggleEvent('${id}')" role="button" aria-expanded="true" aria-controls="event-body-${id}" tabindex="0" onkeydown="if(event.key==='Enter'||event.key===' ')toggleEvent('${id}')">
          <i class="event-collapse-arrow" aria-hidden="true">›</i>
          <div class="event-header-info">
            ${isCurrent ? '<div class="current-call-badge" aria-label="Call in progress">● Now</div>' : ''}
            <div class="event-time">${timeRange}</div>
            <div class="event-name">
              ${title}
              <span class="unsaved-dot" id="unsaved-${id}" aria-label="Unsaved changes"></span>
            </div>
          </div>
        </div>
        <div class="event-body" id="event-body-${id}">
          <div class="event-meta">
            RYSE Care Support Call
            ${issue ? `<br><span class="issue">⚠ ${issue}</span>` : ''}
            ${meetLink ? `<br>🔗 <a href="${meetLink}" target="_blank" aria-label="Join Google Meet">${meetLink.replace('https://','')}</a>` : ''}
            ${phone ? `<br>📞 <a href="tel:${phone.replace(/\D/g,'')}" aria-label="Call ${phone}">${phone}</a>` : ''}
          </div>
          <div class="followup-section">
            <input type="checkbox" class="followup-checkbox" id="followup-${id}" onchange="toggleFollowup('${id}')" aria-label="Mark follow-up needed">
            <label class="followup-label" for="followup-${id}" id="followup-label-${id}">Follow-Up Needed</label>
          </div>
          <div class="category-row">
            <label class="category-label" for="category-${id}">Category:</label>
            <select class="category-select" id="category-${id}" aria-label="Issue category">
              <option value="">Select…</option>
              <option value="Technical">Technical</option>
              <option value="Install">Install</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="resolution-row">
            <label class="resolution-label" for="resolution-${id}">Resolution:</label>
            <select class="resolution-select" id="resolution-${id}" aria-label="Resolution status" onchange="updateResolutionStyle('${id}')">
              <option value="">Select…</option>
              <option value="Resolved">Resolved</option>
              <option value="Pending">Pending</option>
              <option value="Escalated">Escalated</option>
            </select>
          </div>
          <div class="notes-section">
            <button class="notes-toggle open" id="notes-toggle-${id}" onclick="toggleNotes('${id}')" aria-expanded="true" aria-controls="notes-body-${id}">
              <i class="arrow">›</i> <span class="label-text">Call Notes</span>
            </button>
            <div class="notes-body open" id="notes-body-${id}">
              <textarea class="notes-textarea" id="notes-input-${id}" placeholder="Enter call notes, resolution, follow-ups…" oninput="markDirty('${id}')" aria-label="Call notes for ${title}"></textarea>
              <div class="notes-actions">
                <button class="btn-save" id="btn-save-${id}" onclick="saveNotes('${id}','${safeTitle}','${safeTime}','${safeIssue}')" aria-label="Save notes to Google Sheets">
                  <span class="spinner" aria-hidden="true"></span>
                  <span class="btn-label">Save to Sheets</span>
                </button>
                <button class="btn-clear" onclick="clearNotes('${id}')" aria-label="Clear notes">Clear</button>
                <button class="btn-retry" id="btn-retry-${id}" onclick="retrySave('${id}')" aria-label="Retry failed save">↺ Retry</button>
                <span class="save-status" id="status-${id}" aria-live="polite"></span>
              </div>
            </div>
            <div class="notes-preview" id="notes-preview-${id}" style="display:none"></div>
          </div>
        </div>
      `;
      container.appendChild(div);
    });
  }

  function toggleEvent(id) {
    const div = document.getElementById('event-div-' + id);
    const header = div.querySelector('.event-header');
    div.classList.toggle('collapsed');
    const isCollapsed = div.classList.contains('collapsed');
    header.setAttribute('aria-expanded', !isCollapsed);
  }

  function markDirty(id) {
    const dot = document.getElementById('unsaved-' + id);
    const textarea = document.getElementById('notes-input-' + id);
    if (dot) dot.style.display = 'inline-block';
    if (textarea) textarea.classList.add('dirty');
  }

  function clearDirty(id) {
    const dot = document.getElementById('unsaved-' + id);
    const textarea = document.getElementById('notes-input-' + id);
    if (dot) dot.style.display = 'none';
    if (textarea) textarea.classList.remove('dirty');
  }

  function toggleFollowup(id) {
    const checkbox = document.getElementById('followup-' + id);
    const label = document.getElementById('followup-label-' + id);
    if (checkbox.checked) {
      label.classList.add('checked');
      label.textContent = 'Follow-Up Needed ✓';
    } else {
      label.classList.remove('checked');
      label.textContent = 'Follow-Up Needed';
    }
  }

  function updateResolutionStyle(id) {
    const sel = document.getElementById('resolution-' + id);
    if (!sel) return;
    sel.className = 'resolution-select';
    if (sel.value === 'Resolved') sel.classList.add('resolved');
    else if (sel.value === 'Pending') sel.classList.add('pending');
    else if (sel.value === 'Escalated') sel.classList.add('escalated');
  }

  function toggleNotes(id) {
    const body = document.getElementById('notes-body-' + id);
    const btn = document.getElementById('notes-toggle-' + id);
    const isOpen = body.classList.contains('open');
    if (isOpen) {
      body.classList.remove('open');
      btn.classList.remove('open');
      btn.setAttribute('aria-expanded', 'false');
    } else {
      body.classList.add('open');
      btn.classList.add('open');
      btn.setAttribute('aria-expanded', 'true');
      document.getElementById('notes-input-' + id).focus();
    }
  }

  async function saveNotes(id, eventName, eventTime, issueDesc, isRetry) {
    const val = document.getElementById('notes-input-' + id).value.trim();
    if (!val) return;

    const status = document.getElementById('status-' + id);
    const saveBtn = document.getElementById('btn-save-' + id);
    const retryBtn = document.getElementById('btn-retry-' + id);
    const preview = document.getElementById('notes-preview-' + id);
    const toggle = document.getElementById('notes-toggle-' + id);
    const categorySelect = document.getElementById('category-' + id);

    status.textContent = 'Saving…';
    status.className = 'save-status saving';
    saveBtn.disabled = true;
    saveBtn.classList.add('saving');
    retryBtn.classList.remove('visible');

    const dateLabel = formatDateForApps(viewDate);
    const payload = {
      action: 'update',
      date: dateLabel,
      time: eventTime,
      event: eventName,
      issue: issueDesc,
      notes: val,
      followup: document.getElementById('followup-' + id)?.checked ? 'Yes' : 'No',
      category: categorySelect ? categorySelect.value : '',
      resolution: document.getElementById('resolution-' + id)?.value || ''
    };

    // Store for retry
    pendingRetry[id] = { eventName, eventTime, issueDesc };

    try {
      // For FUTURE dates, no auto-save happened on load — ensure the row exists.
      // The 'add' action is idempotent (returns "Already exists" if present).
      if (isFutureDate(viewDate)) {
        await sendToSheet({
          action: 'add',
          date: dateLabel,
          time: eventTime,
          event: eventName,
          issue: issueDesc
        });
      }

      await sendToSheet(payload);

      localNotes[id] = val;
      preview.textContent = val;
      preview.style.display = 'block';
      toggle.classList.add('has-notes');
      toggle.querySelector('.label-text').textContent = 'Call Notes ✓';
      status.textContent = 'Saved to Sheets ✓';
      status.className = 'save-status saved';
      clearDirty(id);
      delete pendingRetry[id];

      setTimeout(() => { status.textContent = ''; status.className = 'save-status'; }, 3000);
    } catch(e) {
      // Auto-retry once if not already a retry
      if (!isRetry) {
        saveBtn.disabled = false;
        saveBtn.classList.remove('saving');
        status.textContent = 'Retrying…';
        await new Promise(r => setTimeout(r, 1500));
        return saveNotes(id, eventName, eventTime, issueDesc, true);
      }
      status.textContent = 'Save failed';
      status.className = 'save-status error';
      retryBtn.classList.add('visible');
      setTimeout(() => { if (status.textContent === 'Save failed') { status.textContent = ''; status.className = 'save-status'; } }, 4000);
    }

    saveBtn.disabled = false;
    saveBtn.classList.remove('saving');
  }

  function retrySave(id) {
    const pending = pendingRetry[id];
    if (!pending) return;
    saveNotes(id, pending.eventName, pending.eventTime, pending.issueDesc, false);
  }

  function clearNotes(id) {
    document.getElementById('notes-input-' + id).value = '';
    const preview = document.getElementById('notes-preview-' + id);
    preview.style.display = 'none';
    const btn = document.getElementById('notes-toggle-' + id);
    btn.classList.remove('has-notes');
    btn.querySelector('.label-text').textContent = 'Call Notes';
    localNotes[id] = '';
    document.getElementById('status-' + id).textContent = '';
    clearDirty(id);
  }

  function copySchedule(btn) {
    const headerLabel = formatDateLabel(viewDate).toUpperCase();
    let text = `📅 SCHEDULE — ${headerLabel}\n`;
    todayEvents.forEach(event => {
      const startTime = formatTime(event.start?.dateTime);
      const endTime = formatTime(event.end?.dateTime);
      const timeRange = `${startTime.replace(' EDT','')} – ${endTime}`;
      const title = event.summary || '';
      const issue = getIssueFromDescription(event.description);
      const meetLink = getMeetLink(event);
      const phone = getPhone(event);
      const idx = todayEvents.indexOf(event);
      const id = 'event_' + idx;
      const notes = (localNotes[id] || '').trim();

      text += `\n──────────────────────────\n\n`;
      text += `⏰ ${timeRange}\n${title}\nRYSE Care Support Call`;
      if (issue) text += `\n⚠ Issue: ${issue}`;
      if (meetLink) text += `\n🔗 ${meetLink}`;
      if (phone) text += `\n📞 ${phone}`;
      if (notes) text += `\nCall Notes:\n${notes}`;
      text += '\n';
    });

    navigator.clipboard.writeText(text).then(() => {
      btn.classList.add('copied');
      btn.innerHTML = '<span>✓</span> Copied!';
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = '<span>📋</span> Copy Schedule';
      }, 2000);
    });
  }
</script>
