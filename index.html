<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RYSE Daily Schedule — TEST</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f0f;
    color: #e8e4dc;
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 32px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* TEST BANNER */
  .test-banner {
    background: #2e0a0a;
    border: 1px solid #5a1a1a;
    color: #f87171;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-align: center;
    padding: 7px 20px;
    border-radius: 8px;
    margin-bottom: 16px;
    max-width: 540px;
    width: 100%;
  }

  .card {
    background: #161616;
    border: 1px solid #2a2a2a;
    border-radius: 16px;
    padding: 32px;
    max-width: 540px;
    width: 100%;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid #222;
  }
  .header-icon { font-size: 18px; }
  .header-title {
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .header-date {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: #555;
    margin-left: auto;
  }
  .event {
    padding: 16px 0;
    border-bottom: 1px solid #1e1e1e;
  }
  .event:last-child { border-bottom: none; }

  /* CURRENT CALL highlight */
  .event.current-call {
    background: #1a1500;
    border-radius: 8px;
    padding: 12px;
    margin: 4px -12px;
    border: 1px solid #3a2e00;
    border-bottom: 1px solid #3a2e00;
  }
  .current-call-badge {
    display: inline-block;
    background: #c8a96e;
    color: #000;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    border-radius: 4px;
    padding: 2px 7px;
    margin-bottom: 6px;
  }

  .event-time {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    color: #c8a96e;
    letter-spacing: 0.02em;
    margin-bottom: 6px;
  }
  .event-name {
    font-size: 15px;
    font-weight: 400;
    color: #fff;
    margin-bottom: 6px;
  }
  .event-meta {
    font-size: 12px;
    color: #666;
    line-height: 1.9;
  }
  .event-meta a {
    color: #6b9fd4;
    text-decoration: none;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
  }
  .event-meta a:hover { color: #88b8e8; text-decoration: underline; }
  .issue {
    display: inline-block;
    background: #251e14;
    border-left: 3px solid #c8a96e;
    color: #d4b87a;
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 0 4px 4px 0;
    margin: 2px 0;
  }
  .tag {
    display: inline-block;
    background: #1f1f1f;
    border: 1px solid #2c2c2c;
    border-radius: 4px;
    padding: 2px 7px;
    font-size: 11px;
    color: #888;
    margin-right: 4px;
    font-family: 'DM Mono', monospace;
  }
  .followup-section {
    margin-top: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .followup-checkbox {
    width: 16px;
    height: 16px;
    accent-color: #c8a96e;
    cursor: pointer;
  }
  .followup-label {
    font-size: 12px;
    color: #666;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    cursor: pointer;
    user-select: none;
  }
  .followup-label.checked { color: #c8a96e; }

  /* UNSAVED DOT */
  .unsaved-dot {
    display: none;
    width: 7px;
    height: 7px;
    background: #c8a96e;
    border-radius: 50%;
    margin-left: 6px;
    vertical-align: middle;
  }
  .has-unsaved .unsaved-dot { display: inline-block; }

  .notes-section {
    margin-top: 12px;
    border-top: 1px dashed #222;
    padding-top: 12px;
  }
  .notes-toggle {
    background: none;
    border: none;
    cursor: pointer;
    color: #555;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0;
    transition: color 0.15s;
  }
  .notes-toggle:hover { color: #888; }
  .notes-toggle.has-notes { color: #6bbf6b; }
  .notes-toggle .arrow {
    display: inline-block;
    transition: transform 0.2s;
    font-style: normal;
  }
  .notes-toggle.open .arrow { transform: rotate(90deg); }
  .notes-body { display: none; margin-top: 10px; }
  .notes-body.open { display: block; }
  .notes-textarea {
    width: 100%;
    background: #111;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    color: #c8c4bc;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 10px 12px;
    resize: vertical;
    min-height: 80px;
    line-height: 1.6;
    outline: none;
    transition: border-color 0.15s;
  }
  .notes-textarea:focus { border-color: #3a3a3a; }
  .notes-textarea.dirty { border-color: #5a4a1a; }
  .notes-textarea::placeholder { color: #333; }
  .notes-actions {
    display: flex;
    gap: 8px;
    margin-top: 8px;
    align-items: center;
  }
  .btn-save {
    background: #1a2e1a;
    border: 1px solid #2d4d2d;
    color: #6bbf6b;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 5px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-save:hover { background: #213d21; }
  .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-clear {
    background: none;
    border: none;
    color: #444;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    cursor: pointer;
    padding: 5px 8px;
    transition: color 0.15s;
  }
  .btn-clear:hover { color: #888; }
  .save-status {
    font-size: 11px;
    color: #555;
    margin-left: auto;
    font-family: 'DM Mono', monospace;
  }
  .save-status.saved { color: #6bbf6b; }
  .save-status.error { color: #e07b7b; }
  .save-status.saving { color: #c8a96e; }
  .notes-preview {
    font-size: 12px;
    color: #5a7a5a;
    line-height: 1.6;
    white-space: pre-wrap;
    font-family: 'DM Sans', sans-serif;
    margin-top: 8px;
    padding: 8px 10px;
    background: #0e1a0e;
    border-radius: 6px;
    border-left: 2px solid #2d4d2d;
  }
  .bottom-btns {
    margin-top: 24px;
    display: flex;
    gap: 10px;
    max-width: 540px;
    width: 100%;
  }
  .copy-btn {
    flex: 1;
    padding: 13px;
    background: #1e1e1e;
    border: 1px solid #2e2e2e;
    border-radius: 10px;
    color: #e8e4dc;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .copy-btn:hover { background: #252525; border-color: #3a3a3a; color: #fff; }
  .copy-btn.copied { background: #1a2e1a; border-color: #2d4d2d; color: #6bbf6b; }
  #auth-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 32px 0;
  }
  #auth-section p { color: #555; font-size: 13px; text-align: center; }
  .sign-in-btn {
    background: #1a2a1a;
    border: 1px solid #2d4d2d;
    color: #6bbf6b;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 12px 28px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .sign-in-btn:hover { background: #213d21; }
  #loading {
    color: #555;
    font-size: 13px;
    text-align: center;
    padding: 32px 0;
    font-family: 'DM Mono', monospace;
  }
  #events-container { width: 100%; }
  #no-events { color: #555; font-size: 13px; text-align: center; padding: 24px 0; }
  .sign-out-btn {
    background: none;
    border: none;
    color: #444;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    padding: 0;
    margin-left: auto;
    transition: color 0.15s;
  }
  .sign-out-btn:hover { color: #888; }
</style>
</head>
<body>

<div class="test-banner">⚠ TEST ENVIRONMENT — saves to test sheet only</div>

<div class="card" id="main-card">
  <div class="header">
    <span class="header-icon">📅</span>
    <span class="header-title">Today's Schedule</span>
    <span class="header-date" id="today-date"></span>
    <button class="sign-out-btn" id="sign-out-btn" style="display:none" onclick="signOut()">Sign out</button>
  </div>

  <div id="auth-section">
    <p>Sign in with Google to load today's support calls</p>
    <button class="sign-in-btn" onclick="signIn()">🔐 Sign in with Google</button>
  </div>

  <div id="loading" style="display:none">Loading today's calls…</div>
  <div id="events-container" style="display:none"></div>
  <div id="no-events" style="display:none">No support calls found for today.</div>
</div>

<div class="bottom-btns" id="bottom-btns" style="display:none">
  <button class="copy-btn" id="copy-btn" onclick="copySchedule(this)">
    <span>📋</span> Copy Schedule
  </button>
</div>

<script>
  const CLIENT_ID = '1046847497846-hgdkmgpd53pbq5uiv9vhbigv133hj8ha.apps.googleusercontent.com';
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwtYxAAb8ob0QefsTELi1X3vtUJ47K152M6KjgU60fh4g96uk7yrJzBh9BH-xknqNjj/exec';
  const SCOPES = 'https://www.googleapis.com/auth/calendar.readonly https://www.googleapis.com/auth/spreadsheets';
  const SHEET_ID = '1hT1xFLmVuptyT_RhTkYcu4z96xo6RVSPu2LNfWqQ0Hs';

  function isRYSESupportCall(event) {
    const title = (event.summary || '').toLowerCase();
    const desc = (event.description || '').toLowerCase();
    const hasPranavPallam = title.includes('pranav pallam');
    const hasCalendly = desc.includes('calendly');
    const hasPhone = /\+?1?[\s.-]?\(?\d{3}\)?[\s.-]?\d{3}[\s.-]?\d{4}/.test(desc);
    const hasOrderNumber = /order\s*(number)?[^:]*:\s*[a-z]{1,4}\d+/i.test(desc);
    return hasPranavPallam || hasCalendly || hasPhone || hasOrderNumber;
  }

  let tokenClient;
  let accessToken = null;
  let todayEvents = [];
  let localNotes = {};

  const today = new Date();
  const dateStr = today.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }).toUpperCase();
  document.getElementById('today-date').textContent = dateStr;

  function isCurrentCall(event) {
    const now = new Date();
    const start = new Date(event.start?.dateTime || event.start?.date);
    const end = new Date(event.end?.dateTime || event.end?.date);
    return now >= start && now <= end;
  }

  window.onload = () => {
    if (typeof google === "undefined") {
      document.getElementById("loading").style.display = "block";
      document.getElementById("loading").textContent = "Error: Google API failed to load.";
      return;
    }
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: SCOPES,
      callback: (resp) => {
        if (resp.error) { console.error(resp); return; }
        accessToken = resp.access_token;
        document.getElementById('sign-out-btn').style.display = 'block';
        fetchTodayEvents();
      }
    });
    const cached = sessionStorage.getItem('ryse_token');
    if (cached) {
      accessToken = cached;
      document.getElementById('auth-section').style.display = 'none';
      document.getElementById('sign-out-btn').style.display = 'block';
      fetchTodayEvents();
    }
  };

  function signIn() {
    tokenClient.requestAccessToken({ prompt: 'consent' });
    document.getElementById('auth-section').style.display = 'none';
    document.getElementById('loading').style.display = 'block';
  }

  function signOut() {
    google.accounts.oauth2.revoke(accessToken, () => {});
    accessToken = null;
    sessionStorage.removeItem('ryse_token');
    document.getElementById('auth-section').style.display = 'flex';
    document.getElementById('events-container').style.display = 'none';
    document.getElementById('bottom-btns').style.display = 'none';
    document.getElementById('sign-out-btn').style.display = 'none';
    document.getElementById('events-container').innerHTML = '';
    localNotes = {};
  }

  function getMonthName(dateStr) {
    const d = new Date(dateStr);
    return d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
  }

  async function sheetsRequest(method, path, body) {
    const url = 'https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID + path;
    const res = await fetch(url, {
      method: method,
      headers: {
        'Authorization': 'Bearer ' + accessToken,
        'Content-Type': 'application/json'
      },
      body: body ? JSON.stringify(body) : undefined
    });
    return res.json();
  }

  async function getOrCreateSheet(monthName) {
    const meta = await sheetsRequest('GET', '');
    const sheets = meta.sheets || [];
    const existing = sheets.find(s => s.properties.title === monthName);
    if (existing) return existing.properties.sheetId;

    const res = await sheetsRequest('POST', ':batchUpdate', {
      requests: [{
        addSheet: {
          properties: { title: monthName, tabColor: { red: 0.05, green: 0.11, blue: 0.16 } }
        }
      }]
    });
    const newSheetId = res.replies[0].addSheet.properties.sheetId;

    await sheetsRequest('POST', ':batchUpdate', {
      requests: [
        {
          repeatCell: {
            range: { sheetId: newSheetId, startRowIndex: 0, endRowIndex: 1, startColumnIndex: 0, endColumnIndex: 7 },
            cell: {
              userEnteredValue: { stringValue: 'RYSE SUPPORT   |   Agent Call Notes Log   |   ' + monthName },
              userEnteredFormat: {
                backgroundColor: { red: 0.05, green: 0.11, blue: 0.16 },
                textFormat: { foregroundColor: { red: 0.79, green: 0.66, blue: 0.30 }, bold: true, fontSize: 14 },
                horizontalAlignment: 'CENTER', verticalAlignment: 'MIDDLE'
              }
            },
            fields: 'userEnteredValue,userEnteredFormat'
          }
        },
        {
          mergeCells: {
            range: { sheetId: newSheetId, startRowIndex: 0, endRowIndex: 1, startColumnIndex: 0, endColumnIndex: 7 },
            mergeType: 'MERGE_ALL'
          }
        }
      ]
    });

    const headers = [['DATE', 'TIME (EDT)', 'EVENT', 'ISSUE DESCRIPTION', 'CALL NOTES', 'FOLLOW-UP', 'ISSUE CATEGORY']];
    await sheetsRequest('PUT', '/values/' + encodeURIComponent(monthName + '!A2:G2') + '?valueInputOption=RAW', {
      values: headers
    });

    await sheetsRequest('POST', ':batchUpdate', {
      requests: [{
        repeatCell: {
          range: { sheetId: newSheetId, startRowIndex: 1, endRowIndex: 2, startColumnIndex: 0, endColumnIndex: 7 },
          cell: {
            userEnteredFormat: {
              backgroundColor: { red: 0.12, green: 0.31, blue: 0.47 },
              textFormat: { foregroundColor: { red: 1, green: 1, blue: 1 }, bold: true, fontSize: 9 },
              horizontalAlignment: 'CENTER', verticalAlignment: 'MIDDLE'
            }
          },
          fields: 'userEnteredFormat'
        }
      }]
    });

    return newSheetId;
  }

  async function findEventRow(monthName, dateStr, eventName) {
    const range = encodeURIComponent(monthName + '!A3:C200');
    const res = await sheetsRequest('GET', '/values/' + range);
    const values = res.values || [];
    for (let i = 0; i < values.length; i++) {
      if (values[i][0] === dateStr && values[i][2] === eventName) {
        return i + 3;
      }
    }
    return -1;
  }

  async function addEventRow(monthName, dateStr, timeStr, eventName, issue) {
    const existing = await findEventRow(monthName, dateStr, eventName);
    if (existing !== -1) return existing;

    const range = encodeURIComponent(monthName + '!A3:A200');
    const res = await sheetsRequest('GET', '/values/' + range);
    const values = res.values || [];
    const separatorExists = values.some(row => row[0] && row[0].toString().includes(dateStr));

    if (!separatorExists) {
      await sheetsRequest('POST', '/values/' + encodeURIComponent(monthName + '!A:G') + ':append?valueInputOption=RAW&insertDataOption=INSERT_ROWS', {
        values: [['📅  ' + dateStr, '', '', '', '', '', '']]
      });
    }

    await sheetsRequest('POST', '/values/' + encodeURIComponent(monthName + '!A:G') + ':append?valueInputOption=RAW&insertDataOption=INSERT_ROWS', {
      values: [[dateStr, timeStr, eventName, issue, '', '', '']]
    });

    return -1;
  }

  async function updateEventNotes(monthName, dateStr, eventName, notes, followup, category) {
    const rowNum = await findEventRow(monthName, dateStr, eventName);
    if (rowNum === -1) return;

    const range = encodeURIComponent(monthName + '!E' + rowNum);
    const res = await sheetsRequest('GET', '/values/' + range);
    const existing = (res.values || [['']])[0][0] || '';
    const newNotes = existing ? existing + '\n---\n' + notes : notes;

    await sheetsRequest('PUT', '/values/' + encodeURIComponent(monthName + '!E' + rowNum + ':G' + rowNum) + '?valueInputOption=RAW', {
      values: [[newNotes, followup, category || '']]
    });
  }

  async function sendToSheet(payload) {
    const monthName = getMonthName(payload.date);
    await getOrCreateSheet(monthName);

    if (payload.action === 'add') {
      await addEventRow(monthName, payload.date, payload.time, payload.event, payload.issue || '');
    } else if (payload.action === 'update') {
      await updateEventNotes(monthName, payload.date, payload.event, payload.notes, payload.followup, payload.category);
    }
  }

  async function autoSaveEvents(events) {
    const dateLabel = today.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    for (const event of events) {
      const startTime = formatTime(event.start?.dateTime);
      const endTime = formatTime(event.end?.dateTime);
      const timeRange = startTime && endTime ? startTime.replace(' EDT','') + ' – ' + endTime : startTime;
      const title = event.summary || '';
      const issue = getIssueFromDescription(event.description);
      await sendToSheet({
        action: 'add',
        date: dateLabel,
        time: timeRange,
        event: title,
        issue: issue
      });
    }
  }

  async function fetchTodayEvents() {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('events-container').style.display = 'none';

    const start = new Date(today);
    start.setHours(0, 0, 0, 0);
    const end = new Date(today);
    end.setHours(23, 59, 59, 999);

    const url = `https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${start.toISOString()}&timeMax=${end.toISOString()}&singleEvents=true&orderBy=startTime`;

    try {
      const res = await fetch(url, { headers: { Authorization: `Bearer ${accessToken}` } });
      const data = await res.json();

      if (data.error) throw new Error(data.error.message);

      sessionStorage.setItem('ryse_token', accessToken);

      todayEvents = (data.items || []).filter(e => {
        const title = (e.summary || '').toLowerCase();
        const isCancelled = title.startsWith('canceled:') || title.startsWith('cancelled:');
        return isRYSESupportCall(e) && !isCancelled;
      });

      document.getElementById('loading').style.display = 'none';

      if (todayEvents.length === 0) {
        document.getElementById('no-events').style.display = 'block';
        return;
      }

      renderEvents(todayEvents);
      document.getElementById('events-container').style.display = 'block';
      document.getElementById('bottom-btns').style.display = 'flex';

      autoSaveEvents(todayEvents);

    } catch(err) {
      document.getElementById('loading').textContent = 'Error loading events: ' + err.message;
    }
  }

  function formatTime(dateTimeStr) {
    if (!dateTimeStr) return '';
    const d = new Date(dateTimeStr);
    return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true }) + ' EDT';
  }

  function parseCalendlyDesc(desc) {
    if (!desc) return { issue: '', order: '', device: '' };
    let plain = desc
      .replace(/<br\s*\/?>/gi, '\n')
      .replace(/<\/p>/gi, '\n')
      .replace(/<p[^>]*>/gi, '\n')
      .replace(/<[^>]*>/g, '')
      .replace(/&amp;/g, '&')
      .replace(/&#39;/g, "'")
      .replace(/&nbsp;/g, ' ')
      .replace(/&lt;/g, '<')
      .replace(/&gt;/g, '>');

    const DELIMITERS = [
      'Please provide a brief description',
      'What is your order number',
      'Are you using an IOS or an Android',
      'Need to make changes',
      'Please ensure you have access',
      'Location:',
      'Event Name:',
      'Powered by Calendly'
    ];
    const delimRe = new RegExp('(' + DELIMITERS.map(d => d.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|') + ')', 'i');
    const parts = plain.split(delimRe).map(p => p.trim()).filter(p => p.length > 0);

    let issue = '', order = '', device = '';
    for (let i = 0; i < parts.length; i++) {
      const part = parts[i];
      if (/Please provide a brief description/i.test(part)) {
        const answer = parts[i + 1] || '';
        issue = answer.replace(/^[:.\s]+/, '').trim().replace(/https?:\/\/\S+/g, '').trim();
      }
      if (/What is your order number/i.test(part)) {
        const answer = parts[i + 1] || '';
        order = answer.replace(/^[:.\s]+/, '').trim().replace(/https?:\/\/\S+/g, '').trim();
        if (order.toLowerCase() === 'na' || order.toLowerCase() === 'n/a') order = '';
      }
      if (/Are you using an IOS or an Android/i.test(part)) {
        const answer = parts[i + 1] || '';
        device = answer.replace(/^[:.\s]+/, '').trim().split('\n')[0];
      }
    }
    return { issue, order, device };
  }

  function getIssueFromDescription(desc) {
    if (!desc) return '';
    const plain = desc
      .replace(/<br\s*\/?>/gi, '\n')
      .replace(/<[^>]*>/g, '')
      .replace(/&amp;/g, '&')
      .replace(/&#39;/g, "'")
      .replace(/&nbsp;/g, ' ');
    const lines = plain.split('\n');
    for (const line of lines) {
      if (/troubleshooting/i.test(line)) {
        const lastColon = line.lastIndexOf(': ');
        if (lastColon !== -1) {
          const answer = line.substring(lastColon + 2).trim();
          if (answer.length > 2 && !/https?:\/\//.test(answer)) return answer;
        }
      }
    }
    return '';
  }

  function getMeetLink(event) {
    if (event.hangoutLink) return event.hangoutLink;
    const desc = event.description || '';
    const match = desc.match(/https:\/\/meet\.google\.com\/[a-z-]+/);
    return match ? match[0] : null;
  }

  function getPhone(event) {
    const loc = event.location || '';
    const desc = event.description || '';
    const combined = loc + ' ' + desc;
    const match = combined.match(/\+?1?[\s.-]?\(?\d{3}\)?[\s.-]?\d{3}[\s.-]?\d{4}/);
    return match ? match[0].trim() : null;
  }

  function renderEvents(events) {
    const container = document.getElementById('events-container');
    container.innerHTML = '';

    events.forEach((event, idx) => {
      const id = 'event_' + idx;
      const startTime = formatTime(event.start?.dateTime || event.start?.date);
      const endTime = formatTime(event.end?.dateTime || event.end?.date);
      const timeRange = startTime && endTime ? `${startTime.replace(' EDT','')} – ${endTime}` : startTime;
      const title = event.summary || 'Untitled Event';
      const issue = getIssueFromDescription(event.description);
      const meetLink = getMeetLink(event);
      const phone = getPhone(event);
      const isCurrent = isCurrentCall(event);

      const div = document.createElement('div');
      div.className = 'event' + (isCurrent ? ' current-call' : '');
      div.id = 'event-div-' + id;
      div.innerHTML = `
        ${isCurrent ? '<div class="current-call-badge">● Now</div>' : ''}
        <div class="event-time">⏰ ${timeRange}</div>
        <div class="event-name">
          ${title}
          <span class="unsaved-dot" id="unsaved-${id}" title="Unsaved changes"></span>
        </div>
        <div class="event-meta">
          RYSE Care Support Call
          ${issue ? `<br><span class="issue">⚠ ${issue}</span>` : ''}
          ${meetLink ? `<br>🔗 <a href="${meetLink}" target="_blank">${meetLink.replace('https://','')}</a>` : ''}
          ${phone ? `<br>📞 <a href="tel:${phone.replace(/\D/g,'')}">${phone}</a>` : ''}
        </div>
        <div class="followup-section">
          <input type="checkbox" class="followup-checkbox" id="followup-${id}" onchange="toggleFollowup('${id}')">
          <label class="followup-label" for="followup-${id}" id="followup-label-${id}">Follow-Up Needed</label>
        </div>
        <div class="notes-section">
          <button class="notes-toggle" id="notes-toggle-${id}" onclick="toggleNotes('${id}')">
            <i class="arrow">›</i> <span class="label-text">Call Notes</span>
          </button>
          <div class="notes-body open" id="notes-body-${id}">
            <textarea class="notes-textarea" id="notes-input-${id}" placeholder="Enter call notes, resolution, follow-ups…" oninput="markDirty('${id}')"></textarea>
            <div class="notes-actions">
              <button class="btn-save" id="btn-save-${id}" onclick="saveNotes('${id}', '${title.replace(/'/g,"\\'")}', '${timeRange.replace(/'/g,"\\'")}', '${issue.replace(/'/g,"\\'")}')">Save to Sheets</button>
              <button class="btn-clear" onclick="clearNotes('${id}')">Clear</button>
              <span class="save-status" id="status-${id}"></span>
            </div>
          </div>
          <div class="notes-preview" id="notes-preview-${id}" style="display:none"></div>
        </div>
      `;
      container.appendChild(div);

      // Open the toggle arrow since notes body starts open
      const toggle = document.getElementById('notes-toggle-' + id);
      if (toggle) toggle.classList.add('open');
    });
  }

  function markDirty(id) {
    const dot = document.getElementById('unsaved-' + id);
    const textarea = document.getElementById('notes-input-' + id);
    if (dot) dot.style.display = 'inline-block';
    if (textarea) textarea.classList.add('dirty');
  }

  function clearDirty(id) {
    const dot = document.getElementById('unsaved-' + id);
    const textarea = document.getElementById('notes-input-' + id);
    if (dot) dot.style.display = 'none';
    if (textarea) textarea.classList.remove('dirty');
  }

  function toggleFollowup(id) {
    const checkbox = document.getElementById('followup-' + id);
    const label = document.getElementById('followup-label-' + id);
    if (checkbox.checked) {
      label.classList.add('checked');
      label.textContent = 'Follow-Up Needed ✓';
    } else {
      label.classList.remove('checked');
      label.textContent = 'Follow-Up Needed';
    }
  }

  function toggleNotes(id) {
    const body = document.getElementById('notes-body-' + id);
    const btn = document.getElementById('notes-toggle-' + id);
    const isOpen = body.classList.contains('open');
    if (isOpen) {
      body.classList.remove('open');
      btn.classList.remove('open');
    } else {
      body.classList.add('open');
      btn.classList.add('open');
      document.getElementById('notes-input-' + id).focus();
    }
  }

  async function saveNotes(id, eventName, eventTime, issueDesc) {
    const val = document.getElementById('notes-input-' + id).value.trim();
    if (!val) return;

    const status = document.getElementById('status-' + id);
    const saveBtn = document.getElementById('btn-save-' + id);
    const preview = document.getElementById('notes-preview-' + id);
    const toggle = document.getElementById('notes-toggle-' + id);
    const categorySelect = document.getElementById('category-' + id);

    status.textContent = 'Saving…';
    status.className = 'save-status saving';
    saveBtn.disabled = true;

    const dateLabel = today.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

    try {
      await sendToSheet({
        action: 'update',
        date: dateLabel,
        time: eventTime,
        event: eventName,
        issue: issueDesc,
        notes: val,
        followup: document.getElementById('followup-' + id)?.checked ? 'Yes' : 'No',
        category: categorySelect ? categorySelect.value : ''
      });

      localNotes[id] = val;
      preview.textContent = val;
      preview.style.display = 'block';
      toggle.classList.add('has-notes');
      toggle.querySelector('.label-text').textContent = 'Call Notes ✓';
      status.textContent = 'Saved to Sheets ✓';
      status.className = 'save-status saved';
      clearDirty(id);

      setTimeout(() => { status.textContent = ''; status.className = 'save-status'; }, 3000);
    } catch(e) {
      status.textContent = 'Error saving';
      status.className = 'save-status error';
      setTimeout(() => { status.textContent = ''; status.className = 'save-status'; }, 3000);
    }
    saveBtn.disabled = false;
  }

  function clearNotes(id) {
    document.getElementById('notes-input-' + id).value = '';
    const preview = document.getElementById('notes-preview-' + id);
    preview.style.display = 'none';
    const btn = document.getElementById('notes-toggle-' + id);
    btn.classList.remove('has-notes');
    btn.querySelector('.label-text').textContent = 'Call Notes';
    localNotes[id] = '';
    document.getElementById('status-' + id).textContent = '';
    clearDirty(id);
  }

  function copySchedule(btn) {
    let text = `📅 TODAY'S SCHEDULE — ${dateStr}\n`;
    todayEvents.forEach(event => {
      const startTime = formatTime(event.start?.dateTime);
      const endTime = formatTime(event.end?.dateTime);
      const timeRange = `${startTime.replace(' EDT','')} – ${endTime}`;
      const title = event.summary || '';
      const issue = getIssueFromDescription(event.description);
      const meetLink = getMeetLink(event);
      const phone = getPhone(event);
      const idx = todayEvents.indexOf(event);
      const id = 'event_' + idx;
      const notes = (localNotes[id] || '').trim();

      text += `\n──────────────────────────\n\n`;
      text += `⏰ ${timeRange}\n${title}\nRYSE Care Support Call`;
      if (issue) text += `\n⚠ Issue: ${issue}`;
      if (meetLink) text += `\n🔗 ${meetLink}`;
      if (phone) text += `\n📞 ${phone}`;
      if (notes) text += `\nCall Notes:\n${notes}`;
      text += '\n';
    });

    navigator.clipboard.writeText(text).then(() => {
      btn.classList.add('copied');
      btn.innerHTML = '<span>✓</span> Copied!';
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = '<span>📋</span> Copy Schedule';
      }, 2000);
    });
  }
</script>
